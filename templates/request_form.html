<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Request Missing Part</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="form-page">

    <div class="header-section">
        <div class="title-box">
            <h1>Request Missing Part</h1>
        </div>
        <div class="subtitle-box">
            <h2>Submit a part issue for admin review</h2>
        </div>
    </div>

    <form class="form-container" action="{{ url_for('request_form') }}" method="POST">

        <input type="text" name="student_name" placeholder="Student Name" required>

        <input type="text" name="student_id" placeholder="Z Number (Z12345678)" pattern="Z\d{8}" maxlength="9" required>

        <input type="text" value="Digital Logic Design" readonly>

        <select name="part_name" required>
            <option value="">Select Part</option>
            <option value="resistor">Resistor</option>
            <option value="breadboard">Breadboard</option>
            <option value="led">LED</option>
        </select>

        <select name="issue_type" required>
            <option value="">Issue Type</option>
            <option value="missing">Missing</option>
            <option value="damaged">Damaged</option>
            <option value="wrong">Wrong Item</option>
        </select>

        <textarea name="description" placeholder="Describe the issue (optional)"></textarea>

        <div class="buttons">
            <button type="submit" class="request">Submit Request</button>
        </div>

    </form>

</body>
</html>
